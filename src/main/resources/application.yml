spring:
  application:
    name: fraud-detection-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:frauddb}
    username: ${DB_USER:fraud_user}
    password: ${DB_PASSWORD:fraud_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
    topics:
      transactions: ${APP_KAFKA_TOPICS_TRANSACTIONS:transactions.raw}
      transactions-dlt: ${APP_KAFKA_TOPICS_TRANSACTIONS_DLT:transactions.raw.dlt}
      fraud-alerts: ${APP_KAFKA_TOPICS_FRAUD_ALERTS:fraud.alerts}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:fraud-rule-engine-group}
  rules:
    amount:
      high-threshold: ${APP_RULES_AMOUNT_HIGH_THRESHOLD:50000.00}
      medium-threshold: ${APP_RULES_AMOUNT_MEDIUM_THRESHOLD:10000.00}
    blacklist:
      merchant-ids: MERCH_FRAUD_001,MERCH_FRAUD_002,MERCH_FRAUD_003
    out-of-hours:
      start: 0
      end: 5
      timezone: Africa/Johannesburg
    foreign-country:
      home-country-code: ${APP_RULES_FOREIGN_COUNTRY_HOME_COUNTRY_CODE:ZA}
      minimum-amount: ${APP_RULES_FOREIGN_COUNTRY_MINIMUM_AMOUNT:1000.00}
    velocity:
      max-transactions: ${APP_RULES_VELOCITY_MAX_TRANSACTIONS:5}
      window-minutes: ${APP_RULES_VELOCITY_WINDOW_MINUTES:10}
  rate-limit:
    auth:
      capacity: 5           # burst: up to 5 consecutive attempts
      refill-per-minute: 5  # steady-state: 5 attempts per minute per IP
      trust-forwarded-headers: false
      trusted-proxies: []
      entry-ttl-minutes: 60
      max-tracked-clients: 10000
      cleanup-interval: 100
  jwt: # Minimum 32 characters for HS256. In production: load from AWS Secrets Manager.
    # Generate a strong secret with: openssl rand -base64 48
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER}
    audience: ${JWT_AUDIENCE}
    expiry-minutes: ${APP_JWT_EXPIRY_MINUTES:60}
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:}"
  auth:
    bootstrap:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    kafka:
      enabled: ${APP_KAFKA_ENABLED:true}
