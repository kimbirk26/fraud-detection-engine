spring:
  application:
    name: fraud-detection-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:frauddb}
    username: ${DB_USER:fraud_user}
    password: ${DB_PASSWORD:fraud_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

app:
  kafka:
    topics:
      transactions: transactions.raw
      transactions-dlt: transactions.raw.dlt
      fraud-alerts: fraud.alerts
    consumer-group: fraud-rule-engine-group
  rules:
    amount:
      high-threshold: 50000.00
      medium-threshold: 10000.00
    blacklist:
      merchant-ids: MERCH_FRAUD_001,MERCH_FRAUD_002,MERCH_FRAUD_003
    out-of-hours:
      start: 0
      end: 5
      timezone: Africa/Johannesburg
    foreign-country:
      home-country-code: ${APP_RULES_FOREIGN_COUNTRY_HOME_COUNTRY_CODE:ZA}
      minimum-amount: ${APP_RULES_FOREIGN_COUNTRY_MINIMUM_AMOUNT:1000.00}
    velocity:
      max-transactions: ${APP_RULES_VELOCITY_MAX_TRANSACTIONS:5}
      window-minutes: ${APP_RULES_VELOCITY_WINDOW_MINUTES:10}
  jwt: # Minimum 32 characters for HS256. In production: load from AWS Secrets Manager.
    # Generate a strong secret with: openssl rand -base64 48
    secret: ${JWT_SECRET}
    expiry-minutes: 60
  auth:
    bootstrap:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
