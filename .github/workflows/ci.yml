name: CI Pipeline (Build + Test)

on:
  push:
    branches: [ "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  JAVA_VERSION: '21'

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build project
        run: ./mvnw -q clean compile

      - name: Run tests
        run: ./mvnw -q test
