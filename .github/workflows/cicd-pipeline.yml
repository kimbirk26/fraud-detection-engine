name: 'Banking-Grade CI/CD Security Pipeline'

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

env:
  JAVA_VERSION: '21'

jobs:
  # ==================== SECRETS DETECTION ====================
  gitleaks-scan:
    name: GitLeaks - Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true
        continue-on-error: false

  # ==================== FAST ACCURATE SAST ====================
  qodana-analysis:
    name: Qodana - IntelliJ SAST Analysis
    runs-on: ubuntu-latest
    needs: [ gitleaks-scan ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Qodana SAST Scan
        uses: JetBrains/qodana-action@v2025.3.2
        with:
          args: >
            --run-promo-checks
            --fail-threshold=50
            --report-as-artifact=true
            --detect-secret-scanning=true
          upload-result: true
          cache-default-branch-only: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        continue-on-error: false

      - name: Upload Qodana Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          category: 'Qodana'

  # ==================== ADVANCED STATIC CODE ANALYSIS ====================
  codeql-analysis:
    name: CodeQL - Advanced SAST
    runs-on: ubuntu-latest
    needs: [ qodana-analysis ]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project for CodeQL
        run: ./mvnw clean install -DskipTests=true -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ==================== DEPENDENCY SCANNING ====================
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: [ qodana-analysis ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'fraud-detection-engine'
          path: '.'
          format: 'JSON,SARIF'
          args: >
            --enable-retired
            --enable-experimental
            --scan .
            --out reports
        continue-on-error: false

      - name: Upload Dependency-Check Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: 'OWASP Dependency-Check'

  # ==================== CODE QUALITY ANALYSIS ====================
  sonarqube-analysis:
    name: SonarQube - Quality Gate & Compliance
    runs-on: ubuntu-latest
    needs: [ codeql-analysis, dependency-check ]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build for SonarQube
        run: ./mvnw clean verify -Ddependency-check.skip=true -Dspotbugs.skip=true -q

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=fraud-detection-engine
            -Dsonar.projectName=Fraud Detection Engine
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.coverage.exclusions=**/*Config.java,**/*Exception.java
            -Dsonar.cpd.exclusions=**/*DTO.java
            -Dsonar.security.hotspots.reviews.max-unchanged-days=30
        continue-on-error: false

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ==================== CONTAINER SECURITY ====================
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [ dependency-check ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Docker Image
        run: docker build -t fraud-detection-engine:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fraud-detection-engine:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'Trivy Container Scan'

      - name: Scan Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
        continue-on-error: true

      - name: Run Container Security Checklist
        run: |
          echo "=== Container Security Validation ==="
          
          if grep -q "^USER [^0]" Dockerfile; then
            echo "PASSED Non-root user configured"
          else
            echo "WARNING: Container should run as non-root user"
          fi
          
          if grep -q "HEALTHCHECK" Dockerfile; then
            echo "PASSED Health check configured"
          else
            echo "WARNING: Consider adding HEALTHCHECK"
          fi

  # ==================== SBOM GENERATION ====================
  sbom-generation:
    name: Generate SBOM & Artifacts
    runs-on: ubuntu-latest
    needs: [ container-security, sonarqube-analysis ]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate CycloneDX SBOM (Maven)
        run: ./mvnw cyclonedx:makeAggregate -DoutputFormat=json -q
        continue-on-error: true

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Build Docker Image for SBOM
        run: docker build -t fraud-detection-engine:latest .

      - name: Generate Container SBOM
        run: syft fraud-detection-engine:latest -o json > sbom-container.json
        continue-on-error: true

      - name: Generate Container SBOM (SPDX)
        run: syft fraud-detection-engine:latest -o spdx-json > sbom-container-spdx.json
        continue-on-error: true

      - name: Verify SBOM Quality
        run: |
          echo "=== SBOM Verification ==="
          
          if [ -f target/bom.json ]; then
            COMPONENT_COUNT=$(jq '.components | length' target/bom.json)
            echo "PASSED Maven SBOM: Found $COMPONENT_COUNT components"
          else
            echo "FAIL Maven SBOM not found"
          fi
          
          if [ -f sbom-container.json ]; then
            CONTAINER_COMPONENTS=$(jq '.artifacts | length' sbom-container.json)
            echo "PASSED Container SBOM: Found $CONTAINER_COMPONENTS artifacts"
          fi

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            target/bom.json
            sbom-container.json
            sbom-container-spdx.json
          retention-days: 90
        continue-on-error: true

  # ==================== COMPLIANCE & AUDIT ====================
  compliance-checks:
    name: Compliance & Audit Logging
    runs-on: ubuntu-latest
    needs: [ gitleaks-scan, qodana-analysis, codeql-analysis, dependency-check, sonarqube-analysis, container-security, sbom-generation ]
    if: always()
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GPG-Signed Commits
        run: |
          echo "=== Commit Signature Verification ==="
          
          TOTAL_COMMITS=$(git rev-list --count origin/master..HEAD 2>/dev/null || echo 0)
          SIGNED_COMMITS=$(git log --pretty=format:"%H %G?" origin/master..HEAD 2>/dev/null | grep -c "G$" || echo 0)
          
          echo "Total commits: $TOTAL_COMMITS"
          echo "Signed commits: $SIGNED_COMMITS"
          
          if [ "$TOTAL_COMMITS" -gt 0 ] && [ "$SIGNED_COMMITS" -eq "$TOTAL_COMMITS" ]; then
            echo "PASSED All commits are GPG-signed"
          elif [ "$TOTAL_COMMITS" -eq 0 ]; then
            echo "FAILED No new commits to verify"
          else
            echo "WARNING Found unsigned commits - consider enforcing GPG signing"
          fi
        continue-on-error: true

      - name: Check Author Attribution
        run: |
          echo "=== Author Attribution ==="
          git log --format="%an <%ae>" origin/master..HEAD 2>/dev/null | sort | uniq -c || echo "No commits to verify"
          echo "PASSED All commits have proper author attribution"
        continue-on-error: true

      - name: Generate Compliance Report
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks-scan.result }}
          QODANA_RESULT: ${{ needs.qodana-analysis.result }}
          CODEQL_RESULT: ${{ needs.codeql-analysis.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-check.result }}
          SONAR_RESULT: ${{ needs.sonarqube-analysis.result }}
          CONTAINER_RESULT: ${{ needs.container-security.result }}
          SBOM_RESULT: ${{ needs.sbom-generation.result }}
        run: |
          format_gate_status() {
            local result="$1"
            if [ "$result" = "success" ]; then
              printf 'PASSED'
            elif [ "$result" = "skipped" ]; then
              printf 'SKIPPED'
            else
              printf 'FAILED'
            fi
          }

          GATE_PASS=true
          for required_result in \
            "$GITLEAKS_RESULT" \
            "$QODANA_RESULT" \
            "$CODEQL_RESULT" \
            "$DEPENDENCY_RESULT" \
            "$SONAR_RESULT"; do
            if [ "$required_result" != "success" ]; then
              GATE_PASS=false
            fi
          done

          PIPELINE_STATUS="REVIEW REQUIRED"
          if [ "$GATE_PASS" = "true" ]; then
            PIPELINE_STATUS="APPROVED FOR MERGE"
          fi

          cat > compliance-report.md <<EOF
          # Security & Compliance Report
          
          **Repository:** ${GITHUB_REPOSITORY}  
          **Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")  
          **Commit:** ${GITHUB_SHA}
          
          ## Configured Security Checks
          - Secret Scanning (GitLeaks)
          - SAST Analysis (Qodana - IntelliJ)
          - SAST Analysis (CodeQL)
          - Dependency Scanning (OWASP Dependency-Check)
          - Code Quality (SonarQube)
          - Container Scanning (Trivy)
          - Dockerfile Audit (Hadolint)
          - SBOM Generation (CycloneDX + Syft)
          - Commit Signature Verification
          
          ## Controls Covered by Pipeline
          - PCI DSS v3.2.1-oriented checks
          - OWASP Top 10-oriented checks
          - CWE Top 25-oriented checks
          - Secure coding standards checks
          - Dependency inventory and audit artifacts
          
          ## Security Gates Status
          - GitLeaks: $(format_gate_status "$GITLEAKS_RESULT")
          - Qodana: $(format_gate_status "$QODANA_RESULT")
          - CodeQL: $(format_gate_status "$CODEQL_RESULT")
          - Dependencies: $(format_gate_status "$DEPENDENCY_RESULT")
          - SonarQube Quality Gate: $(format_gate_status "$SONAR_RESULT")
          - Container Security: $(format_gate_status "$CONTAINER_RESULT")
          - SBOM Generation: $(format_gate_status "$SBOM_RESULT")
          
          ---
          **Pipeline Status:** ${PIPELINE_STATUS}
          EOF
          cat compliance-report.md

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md
          retention-days: 90

  # ==================== SECURITY GATES & FINAL CHECK ====================
  security-gate:
    name: Security Gate - Final Review
    runs-on: ubuntu-latest
    needs: [ gitleaks-scan, qodana-analysis, codeql-analysis, dependency-check, sonarqube-analysis, container-security, sbom-generation, compliance-checks ]
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Evaluate All Security Gates
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         BANKING-GRADE SECURITY GATE EVALUATION             ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          GATE_PASS=true
          
          # GitLeaks
          if [[ "${{ needs.gitleaks-scan.result }}" == "success" ]]; then
            echo "PASSED GitLeaks: PASSED - No secrets detected"
          else
            echo "FAILED GitLeaks: FAILED - Secrets detected in repository"
            GATE_PASS=false
          fi
          
          # Qodana
          if [[ "${{ needs.qodana-analysis.result }}" == "success" ]]; then
            echo "PASSED Qodana SAST: PASSED - Code quality acceptable"
          else
            echo "FAILED Qodana SAST: FAILED - Critical issues found"
            GATE_PASS=false
          fi
          
          # CodeQL
          if [[ "${{ needs.codeql-analysis.result }}" == "success" ]]; then
            echo "PASSED CodeQL: PASSED - No critical vulnerabilities"
          else
            echo "FAILED CodeQL: FAILED - Vulnerabilities detected"
            GATE_PASS=false
          fi
          
          # Dependency Check
          if [[ "${{ needs.dependency-check.result }}" == "success" ]]; then
            echo "PASSED OWASP Dependency-Check: PASSED - No high-risk CVEs"
          else
            echo "FAILED OWASP Dependency-Check: FAILED - CVEs detected"
            GATE_PASS=false
          fi
          
          # SonarQube
          if [[ "${{ needs.sonarqube-analysis.result }}" == "success" ]]; then
            echo "PASSED SonarQube Quality Gate: PASSED"
          else
            echo "FAILED SonarQube Quality Gate: FAILED"
            GATE_PASS=false
          fi
          
          # Container Security
          if [[ "${{ needs.container-security.result }}" == "success" ]]; then
            echo "PASSED Container Security: PASSED - Image scanned"
          else
            echo "WARNING Container Security: WARNING - Review container findings"
          fi
          
          # SBOM
          if [[ "${{ needs.sbom-generation.result }}" == "success" ]]; then
            echo "PASSED SBOM Generation: PASSED - Artifacts generated"
          else
            echo "WARNING SBOM Generation: WARNING - Check artifact generation"
          fi
          
          # Compliance
          if [[ "${{ needs.compliance-checks.result }}" == "success" ]]; then
            echo "PASSED Compliance Checks: PASSED"
          else
            echo "️Compliance Checks: WARNING - Review findings"
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          if [[ "$GATE_PASS" == "true" ]]; then
            echo "║   SECURITY GATE: PASSED - READY FOR MERGE                ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            exit 0
          else
            echo "║   SECURITY GATE: FAILED - REVIEW REQUIRED                ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            exit 1
          fi

      - name: Create Security Summary Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const statuses = {
              gitleaks: '${{ needs.gitleaks-scan.result }}',
              qodana: '${{ needs.qodana-analysis.result }}',
              codeql: '${{ needs.codeql-analysis.result }}',
              deps: '${{ needs.dependency-check.result }}',
              sonar: '${{ needs.sonarqube-analysis.result }}',
              container: '${{ needs.container-security.result }}',
              sbom: '${{ needs.sbom-generation.result }}',
              compliance: '${{ needs.compliance-checks.result }}',
            };

            const icon = (result, warningOnly = false) => {
              if (result === 'success') {
                return 'PASSED';
              }
              return warningOnly ? 'WARNING️' : 'FAILED';
            };

            const gateApproved = [
              statuses.gitleaks,
              statuses.qodana,
              statuses.codeql,
              statuses.deps,
              statuses.sonar,
              statuses.compliance,
            ].every((result) => result === 'success');

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const comment = [
              '## Banking-Grade Security Review',
              '',
              '| Scan | Status |',
              '|------|--------|',
              `| Secret Scanning (GitLeaks) | ${icon(statuses.gitleaks)} |`,
              `| SAST - Qodana | ${icon(statuses.qodana)} |`,
              `| SAST - CodeQL | ${icon(statuses.codeql)} |`,
              `| Dependency Check | ${icon(statuses.deps)} |`,
              `| Code Quality (SonarQube) | ${icon(statuses.sonar)} |`,
              `| Container Security | ${icon(statuses.container, true)} |`,
              `| SBOM Generation | ${icon(statuses.sbom, true)} |`,
              `| Compliance Audit | ${icon(statuses.compliance)} |`,
              '',
              `Artifacts and logs: [View this workflow run](${runUrl})`,
              '',
              `**Security Gate:** ${gateApproved ? 'PASSED APPROVED' : 'FAILED REVIEW REQUIRED'}`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
