{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fraud-detection-engine.secretName" . }}
  labels:
    {{- include "fraud-detection-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ required "secrets.data.dbUser is required when secrets.create=true" .Values.secrets.data.dbUser | quote }}
  DB_PASSWORD: {{ required "secrets.data.dbPassword is required when secrets.create=true" .Values.secrets.data.dbPassword | quote }}
  JWT_SECRET: {{ required "secrets.data.jwtSecret is required when secrets.create=true" .Values.secrets.data.jwtSecret | quote }}
  JWT_ISSUER: {{ required "secrets.data.jwtIssuer is required when secrets.create=true" .Values.secrets.data.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ required "secrets.data.jwtAudience is required when secrets.create=true" .Values.secrets.data.jwtAudience | quote }}
{{- end }}
