apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fraud-detection-engine.configMapName" . }}
  labels:
    {{- include "fraud-detection-engine.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | toString | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  APP_KAFKA_TOPICS_TRANSACTIONS: {{ .Values.kafka.topics.transactions | quote }}
  APP_KAFKA_TOPICS_TRANSACTIONS_DLT: {{ .Values.kafka.topics.transactionsDlt | quote }}
  APP_KAFKA_TOPICS_FRAUD_ALERTS: {{ .Values.kafka.topics.fraudAlerts | quote }}
  APP_KAFKA_CONSUMER_GROUP: {{ .Values.kafka.consumerGroup | quote }}
  APP_RULES_AMOUNT_HIGH_THRESHOLD: {{ .Values.rules.amount.highThreshold | quote }}
  APP_RULES_AMOUNT_MEDIUM_THRESHOLD: {{ .Values.rules.amount.mediumThreshold | quote }}
  APP_RULES_FOREIGN_COUNTRY_HOME_COUNTRY_CODE: {{ .Values.rules.foreignCountry.homeCountryCode | quote }}
  APP_RULES_FOREIGN_COUNTRY_MINIMUM_AMOUNT: {{ .Values.rules.foreignCountry.minimumAmount | quote }}
  APP_RULES_VELOCITY_MAX_TRANSACTIONS: {{ .Values.rules.velocity.maxTransactions | quote }}
  APP_RULES_VELOCITY_WINDOW_MINUTES: {{ .Values.rules.velocity.windowMinutes | quote }}
  APP_JWT_EXPIRY_MINUTES: {{ .Values.jwt.expiryMinutes | toString | quote }}
  APP_AUTH_BOOTSTRAP_ENABLED: {{ .Values.authBootstrap.enabled | toString | quote }}
  JAVA_TOOL_OPTIONS: {{ .Values.javaToolOptions | quote }}
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
  {{- if .Values.springProfilesActive }}
  SPRING_PROFILES_ACTIVE: {{ .Values.springProfilesActive | quote }}
  {{- end }}
  {{- if .Values.cors.allowedOrigins }}
  APP_CORS_ALLOWED_ORIGINS: {{ join "," .Values.cors.allowedOrigins | quote }}
  {{- end }}
